<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmospheric Dark Node Terminal</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        /* 🌌 CYBERPUNK MINIMALIST DARK THEME SYSTEM */
        :root {
            --bg-canvas: #0d0b11;        /* Deep Space Violet Noir */
            --bg-card: #15121b;          /* Sleek Dark Terminal Core */
            --border-main: #ff79c6;      /* Neon Cyber Pink */
            --accent-purple: #9b6ef3;    /* Electric Purple */
            --accent-blue: #8be9fd;      /* Cyber Cyan Blue */
            --accent-yellow: #f1fa8c;    /* Neon Gold Sun */
            --accent-heat: #ff5555;      /* Hot Thermal Red */
            --text-main: #f8f8f2;        /* High-Contrast Off-White */
            --text-sub: #6272a4;         /* Cool Muted Indigo */
            --code-bg: #282a36;          /* Deep Console Plate */
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a1526 0%, var(--bg-canvas) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* 🌪️ FLOATING BACKGROUND WEATHER AMBIENT VECTORS */
        .weather-decor {
            position: absolute;
            z-index: 0;
            opacity: 0.08;
            pointer-events: none;
            color: var(--text-main);
        }
        .decor-sun   { top: 12%; left: 10%; width: 80px; }
        .decor-cloud { bottom: 15%; left: 12%; width: 90px; }
        .decor-rain  { top: 18%; right: 12%; width: 70px; }
        .decor-wind  { bottom: 18%; right: 10%; width: 85px; }

        /* 🏯 WORKSPACE TERMINAL PANEL */
        .workspace-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            background: var(--bg-card);
            border: 3px solid var(--border-main);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0px 12px 40px rgba(0, 0, 0, 0.6), 6px 6px 0px 0px var(--border-main);
            transition: var(--transition-smooth);
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            border-bottom: 2px dashed var(--text-sub);
            padding-bottom: 16px;
        }

        .header-title-set h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header-tag {
            background: var(--code-bg);
            color: var(--accent-blue);
            font-family: 'Space Grotesk', monospace;
            font-size: 0.75rem;
            padding: 4px 10px;
            border: 1px solid var(--text-sub);
            border-radius: 12px;
            font-weight: 500;
        }

        /* 🔍 MINIMALIST INPUT CONSOLE */
        .search-engine {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-field-wrapper {
            position: relative;
            flex: 1;
        }

        .search-engine input {
            width: 100%;
            padding: 14px 18px;
            background: var(--code-bg);
            border: 2px solid var(--text-sub);
            border-radius: 16px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
            transition: var(--transition-smooth);
        }

        .search-engine input:focus {
            border-color: var(--border-main);
            background: #1d1f29;
            box-shadow: 0 0 12px rgba(255, 121, 198, 0.2);
        }

        .search-engine button {
            background: var(--border-main);
            border: none;
            padding: 0 20px;
            border-radius: 16px;
            color: var(--bg-canvas);
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-engine button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 3px 3px 0px 0px var(--text-main);
        }

        /* 📡 CORE RENDERING ENGINE UI */
        .weather-display-node {
            display: none;
            text-align: center;
        }

        .location-meta-block h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .timestamp-label {
            font-size: 0.85rem;
            color: var(--bg-canvas);
            font-weight: 700;
            display: inline-block;
            cursor: pointer;
            background: var(--accent-blue);
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            transition: var(--transition-smooth);
        }

        .timestamp-label:hover {
            transform: scale(1.05);
            background: var(--border-main);
        }

        /* 🔮 NEON EMOJI TRIGGER FRAME */
        .interactive-emoji-trigger {
            font-size: 5rem;
            line-height: 1;
            margin: 12px auto;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 28px;
            background: var(--code-bg);
            border: 2px solid var(--text-sub);
            transition: var(--transition-smooth);
            user-select: none;
            box-shadow: 4px 4px 0px 0px var(--text-sub);
        }

        .interactive-emoji-trigger:hover {
            transform: scale(1.06) rotate(-2deg);
            border-color: var(--border-main);
            box-shadow: 6px 6px 0px 0px var(--border-main);
        }

        .condition-badge-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 12px;
            color: var(--accent-blue);
        }

        .temperature-metric {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .temperature-metric span {
            color: var(--border-main);
            font-size: 2rem;
            margin-left: 2px;
        }

        /* 🎚️ EXPANDABLE SLIDE-OUT TELEMETRY CONSOLE */
        .collapsible-metrics-deck {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(10px);
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, transform 0.3s ease;
            border-top: 0px solid transparent;
            padding-top: 0;
            margin-top: 10px;
        }

        .collapsible-metrics-deck.is-expanded {
            max-height: 180px;
            opacity: 1;
            transform: translateY(0);
            border-top: 2px dashed var(--text-sub);
            padding-top: 20px;
            margin-top: 15px;
        }

        .click-hint-banner {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .metrics-grid-layout {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .cute-data-pill {
            background: var(--code-bg);
            border: 2px solid var(--text-sub);
            border-radius: 16px;
            padding: 14px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition-smooth);
        }

        .cute-data-pill:hover {
            border-color: var(--accent-blue);
        }

        .pill-icon { font-size: 1.5rem; }
        .pill-labels-box { display: flex; flex-direction: column; }
        .pill-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-sub);
        }
        .pill-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* 📟 SYSTEM ERROR LOG DISPLAYS */
        .status-container-box {
            text-align: center;
            padding: 30px 10px;
            color: var(--text-sub);
            font-weight: 600;
        }

        .status-container-box.has-error {
            color: var(--accent-heat);
            background: #22151b;
            border: 2px solid var(--accent-heat);
            border-radius: 16px;
        }

        .loading-dots::after {
            content: '...';
            animation: dots 1s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>

    <svg class="weather-decor decor-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line></svg>
    <svg class="weather-decor decor-cloud" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>
    <svg class="weather-decor decor-rain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="16" y1="13" x2="16" y2="21"></line><line x1="8" y1="13" x2="8" y2="21"></line><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"></path></svg>
    <svg class="weather-decor decor-wind" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2"></path></svg>

    <div class="workspace-card">
        <header class="app-header">
            <div class="header-title-set">
                <h1>Matrix.Weather</h1>
            </div>
            <div class="header-tag">Live Feed</div>
        </header>

        <main>
            <form id="search-engine-form" class="search-engine">
                <div class="search-field-wrapper">
                    <input type="text" id="target-city-input" placeholder="Enter city name (e.g. Vijayawada)..." required autocomplete="off">
                </div>
                <button type="submit" aria-label="Query Node">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </form>

            <div id="status-display" class="status-container-box">
                <p id="status-text">Ready to establish connection with global geocoding matrices.</p>
            </div>

            <article id="weather-matrix-node" class="weather-display-node">
                <div class="location-meta-block">
                    <h2 id="out-city-name">--</h2>
                    <span id="out-timestamp" class="timestamp-label">--:--</span>
                </div>

                <div class="click-hint-banner">⚡ CLICK EMOJI FOR DETAILED METRICS ⚡</div>
                
                <div id="out-emoji-frame" class="interactive-emoji-trigger" role="button" aria-expanded="false">
                    ☀️
                </div>

                <div id="out-condition-txt" class="condition-badge-text">--</div>
                
                <div class="temperature-metric">
                    <span id="out-temp-val">--</span><span>°C</span>
                </div>

                <div id="collapsible-deck" class="collapsible-metrics-deck">
                    <div class="metrics-grid-layout">
                        <div class="cute-data-pill">
                            <span class="pill-icon">💧</span>
                            <div class="pill-labels-box">
                                <span class="pill-label">Humidity</span>
                                <span id="out-humidity" class="pill-value">--</span>
                            </div>
                        </div>
                        <div class="cute-data-pill">
                            <span class="pill-icon">💨</span>
                            <div class="pill-labels-box">
                                <span class="pill-label">Wind Core</span>
                                <span id="out-wind" class="pill-value">--</span>
                            </div>
                        </div>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <script>
        const DOM = {
            form: document.getElementById('search-engine-form'),
            input: document.getElementById('target-city-input'),
            statusBox: document.getElementById('status-display'),
            statusText: document.getElementById('status-text'),
            displayBox: document.getElementById('weather-matrix-node'),
            cityOut: document.getElementById('out-city-name'),
            timeOut: document.getElementById('out-timestamp'),
            emojiFrame: document.getElementById('out-emoji-frame'),
            conditionOut: document.getElementById('out-condition-txt'),
            tempOut: document.getElementById('out-temp-val'),
            humidityOut: document.getElementById('out-humidity'),
            windOut: document.getElementById('out-wind'),
            collapsible: document.getElementById('collapsible-deck')
        };

        DOM.form.addEventListener('submit', handleQuerySubmission);
        DOM.emojiFrame.addEventListener('click', toggleMetricsBreakdown);
        DOM.timeOut.addEventListener('click', toggleMetricsBreakdown);

        function toggleMetricsBreakdown() {
            const isExpanded = DOM.collapsible.classList.contains('is-expanded');
            DOM.collapsible.classList.toggle('is-expanded', !isExpanded);
            DOM.emojiFrame.setAttribute('aria-expanded', !isExpanded ? 'true' : 'false');
        }

        function handleQuerySubmission(event) {
            event.preventDefault();
            const locationString = DOM.input.value.trim();
            if (locationString) {
                ingestAtmosphericTelemetry(locationString);
            }
        }

        async function ingestAtmosphericTelemetry(cityName) {
            setLoadingState();
            DOM.collapsible.classList.remove('is-expanded');

            try {
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=en&format=json`;
                const geoResponse = await fetch(geoUrl);
                if (!geoResponse.ok) throw new Error("Terminal connection timed out during geocoding lookups.");
                
                const geoData = await geoResponse.json();
                if (!geoData.results || geoData.results.length === 0) {
                    throw new Error(`Location "${cityName}" not recognized across active nodes.`);
                }

                const { latitude, longitude, name, country } = geoData.results[0];

                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timeformat=unixtime`;
                const weatherResponse = await fetch(weatherUrl);
                if (!weatherResponse.ok) throw new Error("Meteorological database returned invalid parsing code.");
                
                const weatherData = await weatherResponse.json();
                renderTelemetryToWorkspace(weatherData.current, `${name}, ${country}`);

            } catch (err) {
                setErrorState(err.message);
            }
        }

        function renderTelemetryToWorkspace(currentData, structuredLocation) {
            const rawTemperature = Math.round(currentData.temperature_2m);
            const wmoCode = currentData.weather_code;
            
            DOM.cityOut.textContent = structuredLocation;
            DOM.tempOut.textContent = rawTemperature;
            DOM.humidityOut.textContent = `${currentData.relative_humidity_2m}%`;
            DOM.windOut.textContent = `${currentData.wind_speed_10m} km/h`;

            const dateInstance = new Date(currentData.time * 1000);
            DOM.timeOut.textContent = dateInstance.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Evaluate configuration matrix using user-defined rulesets
            const weatherProfile = resolveWmoAtmosphericState(wmoCode, rawTemperature);
            
            DOM.emojiFrame.textContent = weatherProfile.emoji;
            DOM.conditionOut.textContent = weatherProfile.text;
            DOM.conditionOut.style.color = weatherProfile.colorAccent;
            DOM.emojiFrame.style.borderColor = weatherProfile.colorAccent;

            DOM.statusBox.style.display = 'none';
            DOM.displayBox.style.display = 'block';
        }

        /**
         * 🗺️ USER-DEFINED TEMPERATURE RANGE MAPPING MATRIX
         * Synchronizes raw meteorological codes explicitly with requested thermal boundaries.
         */
        function resolveWmoAtmosphericState(code, temp) {
            // Rule 1: Extreme Hot Wave Threshold Check
            if (temp >= 40) {
                return { emoji: "🔥🥵", text: "Scorching Heatwave Alert", colorAccent: "var(--accent-heat)" };
            }
            
            // Rule 2: Extreme Freezing Threshold Check
            if (temp < 0) {
                return { emoji: "🧊🥶", text: "Freezing Cold Conditions", colorAccent: "var(--accent-blue)" };
            }

            // Rule 3: Evaluation map linking WMO categories directly to user temperature scales
            const isThunderstorm = (code >= 95 && code <= 99) || code === 80 || code === 81 || code === 82;
            const isRain = (code >= 61 && code <= 65);
            const isDrizzle = (code >= 51 && code <= 55);
            const isSnow = (code >= 71 && code <= 77);
            const isFog = (code === 45 || code === 48);
            const isOvercast = (code >= 1 && code <= 3);
            const isClear = (code === 0);

            // Thunderstorm Sub-Matrix Evaluation
            if (isThunderstorm) {
                if (temp >= 20 && temp <= 30) {
                    return { emoji: "⛈️", text: "Warm Tropical Thunderstorm", colorAccent: "var(--accent-purple)" };
                }
                return { emoji: "⛈️", text: "Cool Thunderstorm Front", colorAccent: "var(--accent-purple)" };
            }

            // Rain Sub-Matrix Evaluation
            if (isRain) {
                return { emoji: "⬛🌧️", text: "Heavy Rain Falling", colorAccent: "var(--accent-blue)" };
            }

            // Drizzle Evaluation
            if (isDrizzle) {
                return { emoji: "🌦️", text: "Light Intermittent Drizzle", colorAccent: "var(--accent-blue)" };
            }

            // Fog Evaluation
            if (isFog) {
                return { emoji: "🌫️", text: "Reduced Visibility Fog", colorAccent: "var(--text-sub)" };
            }

            // Snow Evaluation
            if (isSnow) {
                return { emoji: "❄️", text: "Cold Snowfall Matrix", colorAccent: "var(--text-main)" };
            }

            // Dry/Overcast Condition Ranges (Addresses the 30-40°C clear/cloudy categorization anomaly)
            if (temp >= 30 && temp < 40) {
                return { emoji: "☀️", text: "Hot Weather Heatwave", colorAccent: "var(--accent-yellow)" };
            }
            if (temp >= 20 && temp < 30) {
                if (isOvercast) return { emoji: "⛅", text: "Warm Partly Cloudy", colorAccent: "var(--text-sub)" };
                return { emoji: "☀️", text: "Comfortable Warm Weather", colorAccent: "var(--accent-yellow)" };
            }
            if (temp >= 15 && temp < 20) {
                if (isOvercast) return { emoji: "⛅", text: "Mild Pleasant Conditions", colorAccent: "var(--text-sub)" };
                return { emoji: "☀️", text: "Clear Pleasant Sky", colorAccent: "var(--accent-yellow)" };
            }
            if (temp >= 10 && temp < 15) {
                return { emoji: "☁️", text: "Overcast But Comfortable", colorAccent: "var(--text-sub)" };
            }
            if (temp >= 5 && temp < 10) {
                return { emoji: "☁️", text: "Cool Overcast Sky", colorAccent: "var(--text-sub)" };
            }
            if (temp >= 0 && temp < 5) {
                return { emoji: "☁️", text: "Cold And Cloudy Conditions", colorAccent: "var(--accent-blue)" };
            }

            // Standard Baseline Fallback Configuration
            return { emoji: "🌤️", text: "Variable Weather Layout", colorAccent: "var(--accent-purple)" };
        }

        function setLoadingState() {
            DOM.statusBox.style.display = 'block';
            DOM.statusBox.className = "status-container-box";
            DOM.displayBox.style.display = 'none';
            DOM.statusText.innerHTML = `<span class="loading-dots">Accessing satellites</span>`;
        }

        function setErrorState(msg) {
            DOM.statusBox.style.display = 'block';
            DOM.statusBox.className = "status-container-box has-error";
            DOM.displayBox.style.display = 'none';
            DOM.statusText.textContent = `⚠️ System Exception: ${msg}`;
        }
    </script>
</body>
</html>
